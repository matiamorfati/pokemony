<svg width="320" height="320" viewBox="0 0 320 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Favourite Pokémon placeholder">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="72%">
      <stop offset="0%" stop-color="#FFF7CC"/>
      <stop offset="52%" stop-color="#FFE680"/>
      <stop offset="100%" stop-color="#F8C24A"/>
    </radialGradient>

    <linearGradient id="cardGlow" x1="70" y1="44" x2="248" y2="274" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <filter id="softShadow" x="34" y="38" width="252" height="252" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#9B6A00" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="320" height="320" rx="72" fill="url(#bg)"/>

  <!-- subtle background pattern -->
  <g opacity="0.18" stroke="#B87900" stroke-width="3" stroke-linecap="round">
    <path d="M44 86h26"/>
    <path d="M250 86h26"/>
    <path d="M50 236h22"/>
    <path d="M248 236h22"/>
    <path d="M160 32v24"/>
    <path d="M160 264v24"/>
  </g>

  <g filter="url(#softShadow)">
    <!-- pokeball -->
    <circle cx="160" cy="160" r="92" fill="#F7F7F7"/>
    <path d="M69 160a91 91 0 0 1 182 0H69z" fill="#EF4444"/>
    <path d="M69 160h182" stroke="#242424" stroke-width="14" stroke-linecap="round"/>
    <circle cx="160" cy="160" r="31" fill="#F7F7F7" stroke="#242424" stroke-width="12"/>
    <circle cx="160" cy="160" r="12" fill="#FFFFFF"/>

    <!-- gloss -->
    <path d="M98 110c17-28 49-45 82-42" stroke="white" stroke-width="14" stroke-linecap="round" opacity="0.35"/>
  </g>

  <!-- favourite star -->
  <path d="M226.2 71.6c2.3-7.1 12.3-7.1 14.6 0l9.1 27.9c1 3.2 4 5.3 7.3 5.3h29.4c7.4 0 10.5 9.5 4.5 13.9l-23.8 17.3c-2.7 2-3.9 5.4-2.8 8.6l9.1 27.9c2.3 7.1-5.8 12.9-11.8 8.6L238 163.8c-2.7-2-6.4-2-9.1 0l-23.8 17.3c-6 4.3-14.1-1.5-11.8-8.6l9.1-27.9c1.1-3.2-.1-6.6-2.8-8.6l-23.8-17.3c-6-4.4-2.9-13.9 4.5-13.9h29.4c3.3 0 6.3-2.1 7.3-5.3l9.2-27.9z" fill="#FFD84D" stroke="#7A4E00" stroke-width="8" stroke-linejoin="round"/>

  <!-- tiny sparkle -->
  <path d="M82 74l7 16 16 7-16 7-7 16-7-16-16-7 16-7 7-16z" fill="#FFFFFF" opacity="0.7"/>
  <path d="M263 214l5 12 12 5-12 5-5 12-5-12-12-5 12-5 5-12z" fill="#FFFFFF" opacity="0.55"/>

  <rect x="32" y="32" width="256" height="256" rx="58" fill="url(#cardGlow)"/>
</svg>